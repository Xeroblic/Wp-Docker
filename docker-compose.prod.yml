  db:
    image: mariadb:10.6.18
    restart: always
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
      - MYSQL_USER
      - MYSQL_PASSWORD
    command:
      - --innodb-buffer-pool-size=3G
      - --innodb-log-file-size=256M
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-flush-method=O_DIRECT
      - --max-connections=200
      - --query-cache-type=1
      - --query-cache-size=128M
      - --tmp-table-size=128M
      - --max-heap-table-size=128M
      - --thread-cache-size=16
      - --table-open-cache=4000
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1.5G
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 1280mb --maxmemory-policy allkeys-lru --tcp-keepalive 300 --save 900 1 --save 300 10 --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          cpus: '0.25'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  nginx:
    image: nginx:1.28.3-alpine
    restart: always
    depends_on:
      wordpress:
        condition: service_healthy
    expose:
      - "80"
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.wordpress.rule=Host(`${DOMAIN}`)"
    #   - "traefik.http.routers.wordpress.entrypoints=websecure"
    #   - "traefik.http.routers.wordpress.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.wordpress.loadbalancer.server.port=80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - wp_data:/var/www/html:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - backend

  wordpress:
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    image: wordpress:6.9.4-php8.2-fpm
    restart: always
    expose:
      - "9000"
    command: >
      sh -c '
      sed -i "s/pm.max_children = 5/pm.max_children = 40/g" /usr/local/etc/php-fpm.d/www.conf &&
      sed -i "s/pm.start_servers = 2/pm.start_servers = 10/g" /usr/local/etc/php-fpm.d/www.conf &&
      sed -i "s/pm.min_spare_servers = 1/pm.min_spare_servers = 5/g" /usr/local/etc/php-fpm.d/www.conf &&
      sed -i "s/pm.max_spare_servers = 3/pm.max_spare_servers = 20/g" /usr/local/etc/php-fpm.d/www.conf &&
      docker-entrypoint.sh php-fpm
      '
    environment:
      WORDPRESS_DB_HOST: "db:3306"
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      DOMAIN: ${DOMAIN}
      WORDPRESS_CONFIG_EXTRA: |
        /* Redis Object Cache */
        if (!defined('WP_REDIS_HOST')) define('WP_REDIS_HOST', 'redis');
        if (!defined('WP_REDIS_PORT')) define('WP_REDIS_PORT', 6379);

        /* Site URL Configuration */
        define('WP_HOME', 'https://' . getenv('DOMAIN'));
        define('WP_SITEURL', 'https://' . getenv('DOMAIN'));

        /* Disable WP Cron (handled by wp-cron service) */
        define('DISABLE_WP_CRON', true);

        /** Parche Dinámico para el Proxy de Easypanel/Traefik **/
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wp_data:/var/www/html
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./php/redis-config.php:/usr/local/etc/php/redis-config.php:ro
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2560M
        reservations:
          cpus: '0.5'
          memory: 1G
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - internet

  wp-cron:
    depends_on:
      wordpress:
        condition: service_healthy
    image: wordpress:6.9.4-php8.2-fpm
    restart: always
    entrypoint: /bin/sh
    command: ["-c", "while true; do php /var/www/html/wp-cron.php; sleep 300; done"]
    environment:
      WORDPRESS_DB_HOST: "db:3306"
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
    volumes:
      - wp_data:/var/www/html
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./php/redis-config.php:/usr/local/etc/php/redis-config.php:ro
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - internet

volumes:
  db_data:
    driver: local
  wp_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local
  # traefik_certs:
  #   driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  internet:
    driver: bridge
